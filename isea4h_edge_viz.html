var gridLayer=L.layerGroup();
var edgeLayer=L.layerGroup();
var hexLayer=L.layerGroup();
var icoLayer=L.layerGroup();

gridDots.forEach(function(d){
  L.circleMarker([d[0],d[1]],{radius:2,color:faceColors[d[2]],fillColor:faceColors[d[2]],fillOpacity:0.85,weight:0}).addTo(gridLayer);
});

edgeDots.forEach(function(d){
  L.circleMarker([d[0],d[1]],{radius:3,color:'#fff',weight:1,fillColor:faceColors[d[2]],fillOpacity:0.95}).addTo(edgeLayer);
});

hexPolys.forEach(function(h){
  L.polygon(h.coords,{color:faceColors[h.face],weight:1.5,fillColor:faceColors[h.face],fillOpacity:0.2}).addTo(hexLayer);
});

faceEdges.forEach(function(e){
  L.polyline(e,{color:'#fff',weight:2,opacity:0.7}).addTo(icoLayer);
});

gridLayer.addTo(map);
edgeLayer.addTo(map);
hexLayer.addTo(map);
icoLayer.addTo(map);

L.control.layers(null,{
  'Grid (face colors)':gridLayer,
  'Edge samples':edgeLayer,
  'Hex outlines (edge cells)':hexLayer,
  'Icosahedral face edges':icoLayer
},{collapsed:false}).addTo(map);

var legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  var d=L.DomUtil.create('div','legend');
  d.innerHTML='<b>Face Colors &ndash; Res 4</b><br>';
  for(var i=0;i<20;i++){
    d.innerHTML+='<div class="legend-item"><div class="legend-swatch" style="background:'+faceColors[i]+'"></div>Face '+i+'</div>';
  }
  return d;
};
legend.addTo(map);
